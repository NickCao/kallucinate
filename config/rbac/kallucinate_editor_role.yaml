# This rule is not used by the project kallucination itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kallucinate.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kallucination
    app.kubernetes.io/managed-by: kustomize
  name: kallucinate-editor-role
rules:
- apiGroups:
  - kallucinate.io
  resources:
  - kallucinates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kallucinate.io
  resources:
  - kallucinates/status
  verbs:
  - get
