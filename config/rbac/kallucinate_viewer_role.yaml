# This rule is not used by the project kallucination itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to kallucinate.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kallucination
    app.kubernetes.io/managed-by: kustomize
  name: kallucinate-viewer-role
rules:
- apiGroups:
  - kallucinate.io
  resources:
  - kallucinates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kallucinate.io
  resources:
  - kallucinates/status
  verbs:
  - get
