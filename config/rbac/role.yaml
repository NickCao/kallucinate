---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - kallucinate.io
  resources:
  - kallucinates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kallucinate.io
  resources:
  - kallucinates/finalizers
  verbs:
  - update
- apiGroups:
  - kallucinate.io
  resources:
  - kallucinates/status
  verbs:
  - get
  - patch
  - update
